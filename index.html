<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f6f2" id="theme-color">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="today">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon.svg">
  <title>today</title>
  <style>
    :root {
      --background: #f7f6f2;
      --text: #111111;
      --muted: #aaa8a2;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--background);
    }

    html[data-theme="dark"] {
      --background: #090909;
      --text: #f4f4f0;
      --muted: #777773;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--background);
      color: var(--text);
    }

    body {
      min-height: 100svh;
      padding: calc(env(safe-area-inset-top) + 28px) 30px calc(env(safe-area-inset-bottom) + 28px);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      opacity: 1;
      transition: opacity 220ms ease;
    }

    body.is-leaving { opacity: 0; }

    main {
      width: min(100%, 420px);
      margin: auto 0;
      text-align: left;
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 9vw, 48px);
      line-height: .94;
      letter-spacing: -.06em;
      font-weight: 650;
      text-transform: lowercase;
    }

    blockquote {
      margin: 0;
      max-width: 320px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 400;
      text-transform: lowercase;
    }

    cite {
      display: block;
      margin-top: 8px;
      font-style: normal;
      font-size: 11px;
      letter-spacing: .02em;
    }

    .hint {
      margin: 0 auto;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      text-align: center;
      text-transform: lowercase;
    }
  </style>
</head>
<body tabindex="0" aria-label="нажмите, чтобы войти">
  <main>
    <h1>welcome to today</h1>
    <blockquote>
      путь в тысячу ли начинается под ногами.
      <cite>лао-цзы</cite>
    </blockquote>
  </main>

  <p class="hint">нажмите в любом месте, чтобы войти.</p>

  <script>
    (() => {
      const theme = localStorage.getItem('today.theme.v1') || 'light';
      document.documentElement.dataset.theme = theme;
      document.querySelector('#theme-color').content = theme === 'dark' ? '#090909' : '#f7f6f2';

      let entered = false;
      const enter = () => {
        if (entered) return;
        entered = true;
        document.body.classList.add('is-leaving');
        setTimeout(() => location.href = './app.html', 180);
      };

      document.body.addEventListener('click', enter, { once: true });
      document.body.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') enter();
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).catch(() => {});
      }
    })();
  </script>
</body>
</html>
